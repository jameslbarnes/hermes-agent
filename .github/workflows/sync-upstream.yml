name: Sync upstream

on:
  schedule:
    - cron: '0 9 * * 1'  # Every Monday at 9am UTC
  workflow_dispatch:       # Manual trigger

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout fork
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Add upstream remote
        run: git remote add upstream https://github.com/NousResearch/hermes-agent.git

      - name: Fetch upstream
        run: git fetch upstream main

      - name: Rebase on upstream
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git rebase upstream/main

      - name: Push
        run: git push origin main

      - name: Notify on conflict
        if: failure()
        run: |
          echo "::error::Upstream sync failed — likely a rebase conflict. Run manually: git fetch upstream && git rebase upstream/main"
